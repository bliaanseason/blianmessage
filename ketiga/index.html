<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Glow Particles</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
        #text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffb6c1;
            font-family: 'Verdana', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: lowercase;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="text">this is for you</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';

        let scene, camera, renderer, particles;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // --- PARTIKEL HATI BESAR ---
            const particleCount = 8000; // Jumlah partikel lebih banyak biar padat
            const pts = [];
            const colors = [];
            const color = new THREE.Color();

            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                
                // Rumus Hati
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                
                // Efek tebal/volume (Z-axis)
                const z = (Math.random() - 0.5) * 6;
                
                // Tambahkan sedikit sebaran/noise
                const spread = 1 + Math.random() * 0.1;
                pts.push(x * spread, y * spread, z);

                // Variasi warna pink ke merah
                color.setHSL(Math.random() * 0.1 + 0.95, 1.0, 0.6);
                colors.push(color.r, color.g, color.b);
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({ 
                size: 0.15, 
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.7
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);

            window.addEventListener('resize', onResize);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Rotasi halus agar partikel terlihat hidup
            particles.rotation.y += 0.005;
            particles.rotation.z += 0.002;
            
            // Efek detak sedikit (pulsing)
            const time = Date.now() * 0.002;
            const scale = 1 + Math.sin(time) * 0.05;
            particles.scale.set(scale, scale, scale);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
